<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SDD Navigator</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #22263a;
    --border: #2e3250;
    --accent: #6c8ef5;
    --accent2: #4ade80;
    --warn: #f87171;
    --text: #e2e8f0;
    --muted: #8892aa;
    --radius: 10px;
  }

  body {
    font-family: 'Inter', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 24px;
  }

  h1 {
    font-size: 1.5rem;
    font-weight: 700;
    letter-spacing: -0.02em;
    color: var(--text);
  }

  .logo-dot { color: var(--accent); }

  header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 32px;
  }

  .badge {
    background: var(--surface2);
    color: var(--muted);
    font-size: 0.7rem;
    font-weight: 600;
    padding: 3px 8px;
    border-radius: 4px;
    border: 1px solid var(--border);
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .scan-bar {
    display: flex;
    gap: 10px;
    margin-bottom: 32px;
    align-items: stretch;
  }

  .scan-bar input {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    padding: 10px 14px;
    font-size: 0.9rem;
    outline: none;
    transition: border-color 0.15s;
  }

  .scan-bar input:focus { border-color: var(--accent); }
  .scan-bar input::placeholder { color: var(--muted); }

  button {
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: var(--radius);
    padding: 10px 22px;
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.1s;
    white-space: nowrap;
  }

  button:hover { opacity: 0.85; }
  button:active { transform: scale(0.97); }
  button:disabled { opacity: 0.45; cursor: not-allowed; }

  .status-bar {
    font-size: 0.8rem;
    color: var(--muted);
    margin-bottom: 28px;
    min-height: 18px;
  }

  .status-bar.error { color: var(--warn); }
  .status-bar.ok { color: var(--accent2); }

  .metrics-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 14px;
    margin-bottom: 36px;
  }

  .metric-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px 16px;
  }

  .metric-card .label {
    font-size: 0.72rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 8px;
  }

  .metric-card .value {
    font-size: 1.9rem;
    font-weight: 700;
    line-height: 1;
  }

  .metric-card.coverage .value { color: var(--accent); }
  .metric-card.covered .value { color: var(--accent2); }
  .metric-card.uncovered .value { color: var(--warn); }

  .coverage-bar-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px 20px;
    margin-bottom: 36px;
  }

  .coverage-bar-label {
    display: flex;
    justify-content: space-between;
    font-size: 0.8rem;
    color: var(--muted);
    margin-bottom: 10px;
  }

  .coverage-bar-label strong { color: var(--text); }

  .coverage-bar-track {
    height: 8px;
    background: var(--surface2);
    border-radius: 99px;
    overflow: hidden;
  }

  .coverage-bar-fill {
    height: 100%;
    border-radius: 99px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    transition: width 0.6s cubic-bezier(.4,0,.2,1);
    width: 0%;
  }

  .section { margin-bottom: 36px; }

  .section-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 14px;
  }

  .section-header h2 {
    font-size: 1rem;
    font-weight: 600;
  }

  .count-pill {
    background: var(--surface2);
    color: var(--muted);
    font-size: 0.72rem;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 99px;
    border: 1px solid var(--border);
  }

  .table-wrap {
    border-radius: var(--radius);
    border: 1px solid var(--border);
    overflow: hidden;
    overflow-x: auto;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.85rem;
  }

  thead tr {
    background: var(--surface2);
  }

  thead th {
    text-align: left;
    padding: 10px 14px;
    font-size: 0.72rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--muted);
    white-space: nowrap;
  }

  tbody tr {
    border-top: 1px solid var(--border);
    transition: background 0.1s;
  }

  tbody tr:hover { background: var(--surface2); }

  tbody td {
    padding: 10px 14px;
    vertical-align: middle;
  }

  .req-id {
    font-family: 'JetBrains Mono', 'Fira Code', monospace;
    font-size: 0.78rem;
    background: var(--surface2);
    color: var(--accent);
    padding: 2px 7px;
    border-radius: 4px;
    border: 1px solid var(--border);
    white-space: nowrap;
  }

  .fn-name {
    font-family: 'JetBrains Mono', 'Fira Code', monospace;
    font-size: 0.82rem;
    color: var(--accent2);
  }

  .fn-name-warn {
    font-family: 'JetBrains Mono', 'Fira Code', monospace;
    font-size: 0.82rem;
    color: var(--warn);
  }

  .file-path {
    font-size: 0.78rem;
    color: var(--muted);
    font-family: 'JetBrains Mono', 'Fira Code', monospace;
  }

  .line-num {
    font-size: 0.78rem;
    color: var(--muted);
    font-variant-numeric: tabular-nums;
  }

  .empty-state {
    padding: 32px;
    text-align: center;
    color: var(--muted);
    font-size: 0.85rem;
  }

  .spinner {
    display: inline-block;
    width: 14px;
    height: 14px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
    vertical-align: middle;
    margin-right: 6px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  @media (max-width: 600px) {
    body { padding: 16px; }
    .metrics-grid { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>
<body>

<header>
  <h1>SDD<span class="logo-dot">.</span>Navigator</h1>
  <span class="badge">v0.1</span>
</header>

<div class="scan-bar">
  <input id="pathInput" type="text" placeholder="/absolute/path/to/src" />
  <button id="scanBtn" onclick="runScan()">Scan</button>
</div>

<div id="status" class="status-bar"></div>

<div id="dashboard" style="display:none">

  <div class="metrics-grid">
    <div class="metric-card">
      <div class="label">Scanned Files</div>
      <div class="value" id="mFiles">—</div>
    </div>
    <div class="metric-card">
      <div class="label">Total Functions</div>
      <div class="value" id="mFunctions">—</div>
    </div>
    <div class="metric-card covered">
      <div class="label">Covered</div>
      <div class="value" id="mCovered">—</div>
    </div>
    <div class="metric-card uncovered">
      <div class="label">Uncovered</div>
      <div class="value" id="mUncovered">—</div>
    </div>
    <div class="metric-card">
      <div class="label">Unique Reqs</div>
      <div class="value" id="mReqs">—</div>
    </div>
    <div class="metric-card coverage">
      <div class="label">Coverage</div>
      <div class="value" id="mPct">—</div>
    </div>
  </div>

  <div class="coverage-bar-wrap">
    <div class="coverage-bar-label">
      <span>Specification Coverage</span>
      <strong id="barLabel">0%</strong>
    </div>
    <div class="coverage-bar-track">
      <div class="coverage-bar-fill" id="coverageBar"></div>
    </div>
  </div>

  <div class="section">
    <div class="section-header">
      <h2>Requirements</h2>
      <span class="count-pill" id="reqCount">0</span>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Req ID</th>
            <th>Description</th>
            <th>Function</th>
            <th>File</th>
            <th>Line</th>
          </tr>
        </thead>
        <tbody id="reqBody"></tbody>
      </table>
    </div>
  </div>

  <div class="section">
    <div class="section-header">
      <h2>Uncovered Functions</h2>
      <span class="count-pill" id="uncovCount">0</span>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Function</th>
            <th>File</th>
            <th>Line</th>
          </tr>
        </thead>
        <tbody id="uncovBody"></tbody>
      </table>
    </div>
  </div>

</div>

<script>
  async function runScan() {
    const path = document.getElementById('pathInput').value.trim();
    if (!path) { setStatus('Enter a path first.', 'error'); return; }

    const btn = document.getElementById('scanBtn');
    btn.disabled = true;
    setStatus('<span class="spinner"></span>Scanning…', '');

    try {
      const res = await fetch('/scan', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ path })
      });

      const data = await res.json();

      if (!res.ok) {
        setStatus(data.error || 'Scan failed.', 'error');
        return;
      }

      await loadDashboard();
      setStatus('Scan complete.', 'ok');
    } catch (e) {
      setStatus('Network error: ' + e.message, 'error');
    } finally {
      btn.disabled = false;
    }
  }

  async function loadDashboard() {
    const [metrics, requirements, uncovered] = await Promise.all([
      fetch('/metrics').then(r => r.json()),
      fetch('/requirements').then(r => r.json()),
      fetch('/uncovered').then(r => r.json()),
    ]);

    document.getElementById('mFiles').textContent = metrics.scanned_files;
    document.getElementById('mFunctions').textContent = metrics.total_functions;
    document.getElementById('mCovered').textContent = metrics.covered_functions;
    document.getElementById('mUncovered').textContent = metrics.uncovered_functions;
    document.getElementById('mReqs').textContent = metrics.total_unique_requirements;
    document.getElementById('mPct').textContent = metrics.coverage_percentage.toFixed(2) + '%';

    const pct = Math.min(100, Math.max(0, metrics.coverage_percentage));
    document.getElementById('coverageBar').style.width = pct + '%';
    document.getElementById('barLabel').textContent = pct.toFixed(2) + '%';

    renderRequirements(requirements);
    renderUncovered(uncovered);

    document.getElementById('dashboard').style.display = 'block';
  }

  function renderRequirements(items) {
    document.getElementById('reqCount').textContent = items.length;
    const tbody = document.getElementById('reqBody');
    if (!items.length) {
      tbody.innerHTML = '<tr><td colspan="5" class="empty-state">No requirements found.</td></tr>';
      return;
    }
    tbody.innerHTML = items.map(r => `
      <tr>
        <td><span class="req-id">${esc(r.req_id)}</span></td>
        <td>${esc(r.description)}</td>
        <td><span class="fn-name">${esc(r.function_name || '—')}</span></td>
        <td><span class="file-path">${esc(r.file)}</span></td>
        <td><span class="line-num">${r.line}</span></td>
      </tr>
    `).join('');
  }

  function renderUncovered(items) {
    document.getElementById('uncovCount').textContent = items.length;
    const tbody = document.getElementById('uncovBody');
    if (!items.length) {
      tbody.innerHTML = '<tr><td colspan="3" class="empty-state">All functions are covered!</td></tr>';
      return;
    }
    tbody.innerHTML = items.map(u => `
      <tr>
        <td><span class="fn-name-warn">${esc(u.function_name)}</span></td>
        <td><span class="file-path">${esc(u.file)}</span></td>
        <td><span class="line-num">${u.line}</span></td>
      </tr>
    `).join('');
  }

  function setStatus(msg, type) {
    const el = document.getElementById('status');
    el.innerHTML = msg;
    el.className = 'status-bar' + (type ? ' ' + type : '');
  }

  function esc(str) {
    return String(str ?? '')
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  document.getElementById('pathInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') runScan();
  });
</script>
</body>
</html>
